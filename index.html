<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Contact Extractor PRO</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js" defer></script>
    <script src="app.js" defer></script>
</head>
<body>
    <div class="app-shell">
        <header>
            <h1>Contact Data Extractor</h1>
            <p class="subtitle">Precision Name-Number Linking for Indian Mobile Lists.</p>
        </header>

        <section class="panel">
            <div class="panel-header">
                <h2>1) Upload Screenshots</h2>
                <span class="badge">REQUIRED</span>
            </div>
            <div class="upload-box">
                <input id="imageInput" type="file" accept="image/*" multiple>
                <p>Select your screenshots (Multiple allowed)</p>
                <p id="selectedCount" class="status-count">0 files queued</p>
            </div>
            <div id="previewGrid" class="preview-grid"></div>
        </section>

        <section class="panel">
            <div class="panel-header">
                <h2>2) Configuration</h2>
                <span class="badge">SETTINGS</span>
            </div>
            <div class="config-options">
                <label><input type="checkbox" class="field-cb" value="name" checked> Name</label>
                <label><input type="checkbox" class="field-cb" value="mobile" checked> Mobile (+91)</label>
                <label><input type="checkbox" class="field-cb" value="email" checked> Email</label>
                <label><input type="checkbox" class="field-cb" value="upi" checked> UPI ID</label>
            </div>
            <button id="extractBtn" class="main-btn">Extract All Data</button>
        </section>

        <section class="panel">
            <div class="panel-header">
                <h2>3) Results</h2>
                <span class="badge">OUTPUT</span>
            </div>
            <div id="status" class="status-bar">System Standby</div>

            <div class="toolbar">
                <button id="copyBtn" class="tool-btn" disabled>Copy Table</button>
                <button id="toggleDupesBtn" class="tool-btn dupe-btn" disabled>Hide Duplicates</button>
                <button id="copyNameBtn" class="tool-btn" disabled>Copy Names</button>
                <button id="copyMobileBtn" class="tool-btn" disabled>Copy Mobiles</button>
            </div>

            <div class="export-bar">
                <button id="downloadXlsxBtn" class="export-btn" disabled>Export to Excel (.xlsx)</button>
                <button id="downloadCsvBtn" class="export-btn" disabled>Export to CSV</button>
            </div>

            <div class="table-frame">
                <table id="resultsTable">
                    <thead>
                        <tr>
                            <th>Status</th>
                            <th>Source</th>
                            <th>Name</th>
                            <th>Mobile</th>
                            <th>Email</th>
                            <th>UPI</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </section>
    </div>

    <div id="imageModal" class="modal" hidden>
        <div class="modal-bg"></div>
        <div class="modal-content">
            <button id="closeModalBtn" class="close-x">&times;</button>
            <img id="modalImage" src="">
            <p id="modalCaption"></p>
        </div>
    </div>
</body>
</html>
